name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add actual requirements install here
          # pip install -r apps/api-server/requirements.txt

      - name: Run tests
        run: |
          # Add actual tests here
          # pytest

      - name: Build Docker images
        run: |
          echo "Building Phase 1 API server image..."
          docker build -t sentinels/sensor-management apps/sensor-management/
          echo "Building Phase 1 Sensor Agent image..."
          docker build -t sentinels/sensor-agent apps/sensor-agent/
