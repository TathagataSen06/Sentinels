# Honeytrace configuration.
#
# Ports below are the *container-internal* ports the services bind to. The
# provided docker-compose.yml maps the real, low-numbered host ports
# (22, 23, 21, 80, ...) onto these, so the node listens as an unprivileged
# user inside the container. Adjust to taste.

node_id: honeytrace-01

logging:
  level: INFO
  console: true
  # Structured, one-JSON-document-per-line event stream for ingestion.
  event_log: /var/log/honeytrace/events.log
  # Operational/application log.
  app_log: /var/log/honeytrace/honeytrace.log
  rotate_max_bytes: 10485760   # 10 MiB
  rotate_backups: 5

metrics:
  enabled: true
  host: 0.0.0.0
  port: 9101

limits:
  session_timeout: 30      # seconds for a whole session
  read_timeout: 10         # seconds for a single read
  max_line_bytes: 4096     # cap on a single line
  max_session_bytes: 65536 # cap on total bytes read from one peer

rate_limit:
  enabled: true
  max_events_per_minute: 120
  burst: 30

services:
  - name: ssh
    type: ssh
    host: 0.0.0.0
    port: 2222
    banner: "SSH-2.0-OpenSSH_8.9p1 Ubuntu-3ubuntu0.1"

  - name: telnet
    type: telnet
    host: 0.0.0.0
    port: 2323
    banner: "Ubuntu 22.04.3 LTS"
    options:
      hostname: gateway
      max_attempts: 3

  - name: ftp
    type: ftp
    host: 0.0.0.0
    port: 2121
    banner: "ProFTPD Server"

  - name: http
    type: http
    host: 0.0.0.0
    port: 8080
    banner: "nginx/1.24.0"
    options:
      title: "Router Administration"

  - name: redis
    type: generic
    host: 0.0.0.0
    port: 6379
    enabled: false
    banner: "-NOAUTH Authentication required."
    options:
      max_reads: 4
