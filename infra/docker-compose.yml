version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: sentinels-postgres
    environment:
      POSTGRES_USER: sentinels
      POSTGRES_PASSWORD: sentinels_password
      POSTGRES_DB: sentinels
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinels"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sentinels-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api-server:
    build:
      context: ../../apps/api-server
      dockerfile: Dockerfile
    container_name: sentinels-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sentinels:sentinels_password@postgres:5432/sentinels
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../apps/api-server:/app

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: sentinels-prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.1.0
    container_name: sentinels-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
