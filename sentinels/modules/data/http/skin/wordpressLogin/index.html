<!DOCTYPE html>
<html lang="en-US">
<head>
	<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	<title>Log In &lsaquo; WordPress</title>
	<style type="text/css">
		body {
			background: #f1f1f1;
			min-width: 0;
			color: #444;
			font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Oxygen-Sans,Ubuntu,Cantarell,"Helvetica Neue",sans-serif;
			font-size: 13px;
			line-height: 1.4em;
		}
		#login {
			width: 320px;
			padding: 8% 0 0;
			margin: auto;
		}
		#loginform {
			margin-top: 20px;
			margin-left: 0;
			padding: 26px 24px 46px;
			font-weight: 400;
			overflow: hidden;
			background: #fff;
			border: 1px solid #c3c4c7;
			box-shadow: 0 1px 3px rgba(0,0,0,.04);
		}
		.login label {
			font-size: 14px;
			line-height: 1.5;
			display: inline-block;
			margin-bottom: 3px;
		}
		.login input[type=text], .login input[type=password] {
			font-size: 24px;
			width: 100%;
			padding: 3px;
			margin: 2px 6px 16px 0;
			border: 1px solid #8c8f94;
			border-radius: 4px;
			box-shadow: inset 0 1px 2px rgba(0,0,0,.07);
		}
		.button-primary {
			background: #2271b1;
			border-color: #2271b1;
			color: #fff;
			text-decoration: none;
			text-shadow: none;
			display: inline-block;
			font-size: 13px;
			line-height: 2.15384615;
			min-height: 30px;
			margin: 0;
			padding: 0 10px;
			cursor: pointer;
			border-width: 1px;
			border-style: solid;
			border-radius: 3px;
			float: right;
		}
		h1 a {
			background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGcxPSIwIiBjeT0iMTAiIHI9IjM1IiBmaWxsPSIjMjM2YzlkIi8+PC9zdmc+');
			background-size: 84px;
			background-position: center top;
			background-repeat: no-repeat;
			color: #444;
			height: 84px;
			font-size: 20px;
			font-weight: 400;
			line-height: 1.3em;
			margin: 0 auto 25px;
			padding: 0;
			text-decoration: none;
			width: 84px;
			text-indent: -9999px;
			outline: 0;
			overflow: hidden;
			display: block;
		}
	</style>
</head>
<body class="login js login-action-login wp-core-ui  locale-en-us">
	<div id="login">
		<h1><a href="https://wordpress.org/">Powered by WordPress</a></h1>
		<form name="loginform" id="loginform" action="/wp-login.php" method="post">
			<p>
				<label for="user_login">Username or Email Address</label>
				<input type="text" name="log" id="user_login" class="input" value="" size="20" autocapitalize="off" />
			</p>
			<p>
				<label for="user_pass">Password</label>
				<input type="password" name="pwd" id="user_pass" class="input" value="" size="20" />
			</p>
			<p class="forgetmenot"><label for="rememberme"><input name="rememberme" type="checkbox" id="rememberme" value="forever"  /> Remember Me</label></p>
			<p class="submit">
				<input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Log In" />
			</p>
		</form>
	</div>
</body>
</html>
