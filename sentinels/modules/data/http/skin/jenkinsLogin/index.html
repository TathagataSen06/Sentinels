<!DOCTYPE html>
<html>
<head>
    <title>Sign in [Jenkins]</title>
    <style>
        body { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif; background: #f0f0f0; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 30px; border-radius: 5px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 300px; text-align: center; }
        .login-box h1 { font-size: 24px; margin-bottom: 20px; font-weight: 300; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 14px; margin-bottom: 5px; font-weight: bold; }
        .input-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 3px; box-sizing: border-box; }
        .submit-btn { background: #0066cc; color: white; border: none; padding: 10px 15px; border-radius: 3px; width: 100%; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .submit-btn:hover { background: #0052a3; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Welcome to Jenkins!</h1>
        <form action="/j_spring_security_check" method="post">
            <div class="input-group">
                <label for="j_username">User:</label>
                <input type="text" id="j_username" name="j_username" required>
            </div>
            <div class="input-group">
                <label for="j_password">Password:</label>
                <input type="password" id="j_password" name="j_password" required>
            </div>
            <div class="input-group" style="display: flex; align-items: center;">
                <input type="checkbox" id="remember_me" name="remember_me" style="width: auto; margin-right: 10px;">
                <label for="remember_me" style="font-weight: normal; margin: 0;">Keep me signed in</label>
            </div>
            <button type="submit" class="submit-btn">Sign in</button>
        </form>
    </div>
</body>
</html>
